# ═══════════════════════════════════════════════════════════════════════════
# Canadian Political Data — docker-compose orchestration
# ═══════════════════════════════════════════════════════════════════════════
# Start everything:           docker compose up -d
# Run a scan (on demand):     docker compose run --rm scanner scan
# Seed orgs:                  docker compose run --rm scanner seed-orgs
# Ingest federal MPs:         docker compose run --rm scanner ingest-mps
# Stop everything:            docker compose down
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ── Database ──────────────────────────────────────────────────────
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    image: sovpro-db:latest
    container_name: sw-db
    environment:
      POSTGRES_DB: sovereignwatch
      POSTGRES_USER: sw
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      TZ: UTC
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sw -d sovereignwatch"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [sw]

  # ── API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: sw-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3000
      API_HOST: 0.0.0.0
      API_LOG_LEVEL: ${API_LOG_LEVEL:-info}
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-*}
      DATABASE_URL: postgresql://sw:${DB_PASSWORD}@db:5432/sovereignwatch
      CHANGE_WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET:-}
      API_KEY_PEPPER: ${API_KEY_PEPPER:-}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-smtp.protonmail.ch}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # AI contradictions analysis (grouped search). Unset OPENROUTER_API_KEY
      # → feature disabled, button greys out in the UI. The model defaults
      # live in services/api/src/config.ts; both env-var names are forwarded
      # so a host with the legacy OPENROUTER_MODEL keeps working (a
      # one-line deprecation warning prints at boot in that case).
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_CONTRADICTIONS_MODEL: ${OPENROUTER_CONTRADICTIONS_MODEL:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-https://canadianpoliticaldata.org}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Canadian Political Data}
      OPENROUTER_TIMEOUT_MS: ${OPENROUTER_TIMEOUT_MS:-30000}
      # Stripe billing rail (premium-reports phase 1a). Unset
      # STRIPE_SECRET_KEY → /me/credits/checkout 503s and buy buttons
      # hide; unset STRIPE_WEBHOOK_SECRET → /webhooks/stripe refuses
      # every event (fail-closed, not fail-open). Each unset price id
      # hides its pack individually on the frontend pack listing.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID_CREDIT_PACK_SMALL: ${STRIPE_PRICE_ID_CREDIT_PACK_SMALL:-}
      STRIPE_PRICE_ID_CREDIT_PACK_MEDIUM: ${STRIPE_PRICE_ID_CREDIT_PACK_MEDIUM:-}
      STRIPE_PRICE_ID_CREDIT_PACK_LARGE: ${STRIPE_PRICE_ID_CREDIT_PACK_LARGE:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-}
      # Stripe Tax: runtime opt-in (true|1) that mirrors the dashboard
      # Tax-activation switch. Off by default — flipping this on before
      # completing dashboard setup will 400 every checkout. See
      # docs/plans/premium-reports.md § Stripe Tax for the activation
      # checklist.
      STRIPE_TAX_ENABLED: ${STRIPE_TAX_ENABLED:-}
      # Correction-reward payout per accepted submission. Tunable
      # without a rebuild. Zero disables the reward entirely.
      CORRECTION_REWARD_CREDITS: ${CORRECTION_REWARD_CREDITS:-10}
      # Premium reports phase 1b — paid LLM map-reduce. The api uses
      # these for cost-estimate (POST /reports/estimate) and the
      # /reports/meta enabled flag; the reports-worker uses them for
      # the actual map-reduce run. Both sides MUST agree on the cost
      # formula and chunk cap or the user-facing estimate diverges
      # from what the worker actually consumes.
      OPENROUTER_REPORT_MODEL: ${OPENROUTER_REPORT_MODEL:-anthropic/claude-sonnet-4.6}
      OPENROUTER_REPORT_TIMEOUT_MS: ${OPENROUTER_REPORT_TIMEOUT_MS:-120000}
      REPORT_BASE_COST_CREDITS: ${REPORT_BASE_COST_CREDITS:-5}
      REPORT_PER_CHUNK_BUCKET_COST: ${REPORT_PER_CHUNK_BUCKET_COST:-1}
      REPORT_BUCKET_SIZE: ${REPORT_BUCKET_SIZE:-10}
      REPORT_MAX_CHUNKS: ${REPORT_MAX_CHUNKS:-300}
      REPORT_HNSW_EF_SEARCH: ${REPORT_HNSW_EF_SEARCH:-1000}
      REPORTS_RATE_LIMIT_DEFAULT_PER_DAY: ${REPORTS_RATE_LIMIT_DEFAULT_PER_DAY:-5}
      REPORTS_RATE_LIMIT_EXTENDED_PER_DAY: ${REPORTS_RATE_LIMIT_EXTENDED_PER_DAY:-20}
    restart: unless-stopped
    networks: [sw]

  # ── Frontend (static SPA served by nginx:alpine) ──────────────────
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: sw-frontend
    restart: unless-stopped
    networks: [sw]

  # ── Embedding service — TEI serving Qwen3-Embedding-0.6B ──────────
  # HuggingFace Text Embeddings Inference on the local RTX 4050 Mobile.
  # Length-sorted unpadded batching + async tokenization; measured at
  # ~75 chunks/sec for pure GPU throughput (50.9 end-to-end through the
  # scanner's batched-UNNEST write path).
  #
  # Reachable inside compose at http://tei:80 (HTTP API is
  # OpenAI-compatible at /v1/embeddings plus TEI-native /embed). Model
  # weights cache in the `embedmodels` named volume — first request
  # pulls ~1.3 GB from HuggingFace; subsequent boots are seconds.
  # `docker compose stop tei` releases the GPU cleanly.
  #
  # The legacy BGE-M3 + BGE-reranker FastAPI wrapper lived here until
  # 2026-04-19; the `services/embed/` directory keeps the code on disk
  # for rollback but the service definition has been removed.
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:89-1.9
    container_name: sw-tei
    environment:
      NVIDIA_VISIBLE_DEVICES: ${EMBED_CUDA_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Hugging Face token — unauthenticated pulls work for public models
      # but hit rate limits. Optional.
      HF_API_TOKEN: ${HF_API_TOKEN:-}
    command:
      - --model-id=${TEI_MODEL:-Qwen/Qwen3-Embedding-0.6B}
      - --dtype=float16
      - --max-client-batch-size=${TEI_MAX_CLIENT_BATCH:-64}
      # Lowered 16384 -> 8192 on 2026-04-28 after the open-kernel-driver
      # GSP regression / CUDA_ERROR_LAUNCH_FAILED incidents. Smaller
      # per-batch GSP allocations reduce pressure on the failing path
      # at a modest throughput cost. See docs/runbooks/resume-after-reboot-2026-04-28-bc-pre-p38-embed-continued.md.
      - --max-batch-tokens=${TEI_MAX_BATCH_TOKENS:-8192}
    volumes:
      # Share the existing model cache so Qwen3 weights persist across
      # rebuilds. TEI expects HF_HOME-style layout at /data.
      - embedmodels:/data
    healthcheck:
      # Device-aware probe: a single-token /embed roundtrip is bimodal
      # — CUDA returns in <200ms, CPU fallback takes 2-10s. --max-time 1
      # fails curl on CPU and passes on CUDA, so the container goes
      # `unhealthy` the moment TEI degrades to CPU after a CUDA fault.
      # The embed client also enforces this at preflight (belt + braces).
      test: ["CMD-SHELL", "curl -fsS --max-time 1 -X POST -H 'Content-Type: application/json' -d '{\"inputs\":[\"x\"],\"normalize\":true}' http://localhost/embed >/dev/null"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 120s
    # `unless-stopped` so TEI comes back after host reboot. The earlier
    # `on-failure:5` cap (2026-04-28) was reverted on 2026-05-04 after a
    # reboot left TEI stopped indefinitely — Docker's on-failure policy
    # ignores clean SIGTERM exits (code 0), so a graceful shutdown during
    # host shutdown was treated as "not a failure" and never restarted.
    # The wedged-driver bounce-loop concern that motivated the cap is
    # already covered by (a) the device-aware healthcheck below, which
    # marks CPU-fallback as unhealthy, and (b) the scanner-side embed
    # client's preflight + retry + abort-on-5-consecutive-failures guard
    # in services/scanner/src/legislative/speech_embedder.py.
    restart: unless-stopped
    networks: [sw]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${EMBED_GPU_COUNT:-all}
              capabilities: [gpu]
        limits:
          memory: ${TEI_MEMORY:-6g}

  # ── GPU sampler (operator observability) ──────────────────────────
  # Tiny side-car that polls NVML every SAMPLE_INTERVAL_SECONDS and
  # scrapes TEI's native /metrics endpoint, writing to private.gpu_samples
  # and private.tei_samples. Only the second service with a GPU attach;
  # NVML is read-only and creates no CUDA context, so this adds ~0 VRAM
  # pressure beside TEI. Powers the admin /usage page.
  gpu-sampler:
    build:
      context: ./services/gpu-sampler
      dockerfile: Dockerfile
    container_name: sw-gpu-sampler
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sw:${DB_PASSWORD}@db:5432/sovereignwatch
      TEI_URL: ${EMBED_URL:-http://tei:80}
      SAMPLE_INTERVAL_SECONDS: ${USAGE_SAMPLE_INTERVAL:-30}
      NVIDIA_VISIBLE_DEVICES: ${EMBED_CUDA_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: utility
    restart: unless-stopped
    networks: [sw]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${EMBED_GPU_COUNT:-all}
              capabilities: [gpu]

  # ── Scanner (run-on-demand) ───────────────────────────────────────
  scanner:
    build:
      context: ./services/scanner
      dockerfile: Dockerfile
    container_name: sw-scanner
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sw:${DB_PASSWORD}@db:5432/sovereignwatch
      SCANNER_CONCURRENCY: ${SCANNER_CONCURRENCY:-16}
      SCANNER_HTTP_TIMEOUT: ${SCANNER_HTTP_TIMEOUT:-15}
      SCANNER_USER_AGENT: ${SCANNER_USER_AGENT:-CanadianPoliticalDataBot/1.0 (+https://canadianpoliticaldata.org)}
      GEOIP_CITY_PATH: /data/GeoLite2-City.mmdb
      GEOIP_ASN_PATH:  /data/GeoLite2-ASN.mmdb
      SEED_SQL_PATH: /app/db/seed.sql
      OPENNORTH_BASE: ${OPENNORTH_BASE:-https://represent.opennorth.ca}
      EMBED_URL: ${EMBED_URL:-http://tei:80}
      EMBED_MODEL_TAG: ${EMBED_MODEL_TAG:-qwen3-embedding-0.6b}
      EMBED_BATCH: ${EMBED_BATCH:-32}
      # Optional — used by agent-missing-socials (Tier-3 socials backfill).
      # If unset, the command aborts gracefully rather than proceeding.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/data:ro
      - ./db:/app/db:ro
      # Phase 4 helper scripts (e.g. scripts/generate_muni_sets.py).
      # The generator also needs write access to the scanner's src directory
      # so the refreshed _muni_sets_generated.py persists to the host repo.
      - ./scripts:/app/scripts:ro
      - ./services/scanner/src:/app/src
      # Locally-mirrored binary assets (politician portraits, etc).
      # Written by backfill-politician-photos; served RO by nginx.
      - assets:/assets
    profiles: ["tools"]
    networks: [sw]

  # ── Admin-panel jobs worker ───────────────────────────────────────
  # Consumes scanner_jobs (queued) and expands scanner_schedules (cron).
  # Reuses the scanner image; single worker process; one job at a time.
  # Separate from scanner-cron because that is a fixed-schedule bash
  # loop — the DB-driven admin queue is its own concern.
  scanner-jobs:
    build:
      context: ./services/scanner
      dockerfile: Dockerfile
    container_name: sw-scanner-jobs
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sw:${DB_PASSWORD}@db:5432/sovereignwatch
      EMBED_URL: ${EMBED_URL:-http://tei:80}
      EMBED_MODEL_TAG: ${EMBED_MODEL_TAG:-qwen3-embedding-0.6b}
      EMBED_BATCH: ${EMBED_BATCH:-32}
      SCANNER_CONCURRENCY: ${SCANNER_CONCURRENCY:-16}
      GEOIP_CITY_PATH: /data/GeoLite2-City.mmdb
      GEOIP_ASN_PATH:  /data/GeoLite2-ASN.mmdb
      JOBS_POLL_INTERVAL: ${JOBS_POLL_INTERVAL:-5}
      JOBS_DEFAULT_TIMEOUT: ${JOBS_DEFAULT_TIMEOUT:-7200}
      # Required when running the agent-missing-socials job via the admin
      # worker. Unset ⇒ job will log the ANTHROPIC_API_KEY-missing warning
      # and exit cleanly.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/data:ro
      - ./db:/app/db:ro
      - ./services/scanner/src:/app/src
      - assets:/assets
    entrypoint: ["python", "-m", "src", "jobs-worker"]
    restart: unless-stopped
    networks: [sw]

  # ── Alerts worker (saved-searches digest sender) ──────────────────
  # Polls saved_searches for due rows (alert_cadence != 'none') and
  # sends a digest email when new matches land in the corpus. Uses the
  # same Proton SMTP relay as the API. Idle cost: one query every
  # ALERTS_POLL_INTERVAL seconds (default 300s); actual email sends are
  # gated by the per-search cadence (daily / weekly).
  alerts-worker:
    build:
      context: ./services/scanner
      dockerfile: Dockerfile
    container_name: sw-alerts-worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sw:${DB_PASSWORD}@db:5432/sovereignwatch
      ALERTS_POLL_INTERVAL: ${ALERTS_POLL_INTERVAL:-300}
      ALERTS_DIGEST_LIMIT: ${ALERTS_DIGEST_LIMIT:-10}
      SMTP_HOST: ${SMTP_HOST:-smtp.protonmail.ch}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:5173}
      # Used to HMAC-sign one-click unsubscribe tokens in digest emails
      # (shared secret with the api service). Unset → digests ship without
      # List-Unsubscribe headers; deliverability degrades but nothing breaks.
      JWT_SECRET: ${JWT_SECRET:-}
    volumes:
      - ./services/scanner/src:/app/src
    entrypoint: ["python", "-m", "src", "alerts-worker"]
    restart: unless-stopped
    networks: [sw]

  # ── Reports worker (premium full-report generator) ────────────────
  # Consumes report_jobs (queued) for the premium /reports flow. Polls
  # every REPORTS_POLL_INTERVAL seconds, claims oldest queued job via
  # FOR UPDATE SKIP LOCKED, runs an LLM map-reduce over every matching
  # speech_chunk for the (politician, query) pair via OpenRouter, then
  # persists sanitised HTML on the row, commits the credit hold on
  # success / releases on failure, and sends a "ready" or "failed"
  # email via the same SMTP relay the alerts-worker uses.
  #
  # Stale-claim re-queue: a job stuck in 'running' past 15 minutes is
  # considered abandoned by a crashed worker and re-queued. The
  # credit_ledger hold stays in place across re-queues — no double-debit.
  reports-worker:
    build:
      context: ./services/scanner
      dockerfile: Dockerfile
    container_name: sw-reports-worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sw:${DB_PASSWORD}@db:5432/sovereignwatch
      EMBED_URL: ${EMBED_URL:-http://tei:80}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_REPORT_MODEL: ${OPENROUTER_REPORT_MODEL:-anthropic/claude-sonnet-4.6}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-https://canadianpoliticaldata.org}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Canadian Political Data}
      OPENROUTER_REPORT_TIMEOUT_MS: ${OPENROUTER_REPORT_TIMEOUT_MS:-120000}
      REPORTS_POLL_INTERVAL: ${REPORTS_POLL_INTERVAL:-5}
      REPORT_BUCKET_SIZE: ${REPORT_BUCKET_SIZE:-10}
      REPORT_MAX_CHUNKS: ${REPORT_MAX_CHUNKS:-300}
      REPORT_HNSW_EF_SEARCH: ${REPORT_HNSW_EF_SEARCH:-1000}
      SMTP_HOST: ${SMTP_HOST:-smtp.protonmail.ch}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:5173}
    volumes:
      - ./services/scanner/src:/app/src
    entrypoint: ["python", "-m", "src", "reports-worker"]
    restart: unless-stopped
    networks: [sw]

  # ── Scheduled scanner (cron-ish sidecar) ──────────────────────────
  scanner-cron:
    build:
      context: ./services/scanner
      dockerfile: Dockerfile
    container_name: sw-scanner-cron
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sw:${DB_PASSWORD}@db:5432/sovereignwatch
      SCANNER_CONCURRENCY: ${SCANNER_CONCURRENCY:-16}
      GEOIP_CITY_PATH: /data/GeoLite2-City.mmdb
      GEOIP_ASN_PATH:  /data/GeoLite2-ASN.mmdb
    volumes:
      - ./data:/data:ro
      - ./db:/app/db:ro
      - ./scripts/scanner-cron.sh:/cron.sh:ro
    entrypoint: ["/bin/sh", "/cron.sh"]
    restart: unless-stopped
    networks: [sw]

  # ── Change detection (external service) ───────────────────────────
  change-detection:
    image: ghcr.io/thedurancode/change:latest
    container_name: sw-change
    volumes:
      - changedata:/data
    environment:
      WEBHOOK_URL: http://api:3000/api/v1/webhooks/change
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    depends_on: [api]
    restart: unless-stopped
    networks: [sw]

  # ── Uptime Kuma ───────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: sw-kuma
    volumes:
      - kumadata:/app/data
    restart: unless-stopped
    networks: [sw]

  # ── docs site (MkDocs Material) ───────────────────────────────────
  # Live preview only: serves at http://localhost:8000 for editing the
  # markdown under ./mkdocs/docs/. The PUBLIC docs site at
  # docs.canadianpoliticaldata.org is served by nginx from the static
  # build output under ./mkdocs/site/, NOT from this service.
  #
  # Build the static site for nginx with:
  #   docker compose run --rm docs build --strict
  #
  # Serve preview (default) with:
  #   docker compose up -d docs
  docs:
    image: squidfunk/mkdocs-material:latest
    container_name: sw-docs
    working_dir: /docs
    user: "${UID:-1000}:${GID:-1000}"
    command: ["serve", "--dev-addr=0.0.0.0:8000"]
    volumes:
      - ./mkdocs:/docs
    ports:
      # Bind to localhost only — the public docs site goes through nginx,
      # this port is for the operator's browser during editing.
      - "127.0.0.1:${DOCS_PREVIEW_PORT:-8000}:8000"
    restart: unless-stopped
    networks: [sw]

  # ── nginx (public entrypoint) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sw-nginx
    ports:
      - "${HTTP_PORT:-8088}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - assets:/var/www/assets:ro
      # Static-built docs site. Populated by `docker compose run --rm docs build`.
      # Missing on a fresh checkout — the docs vhost will 404 cleanly until
      # the first build is run. See nginx/conf.d/docs.conf.
      - ./mkdocs/site:/var/www/docs:ro
      # Public dataset downloads. Mounted RO; populated weekly by
      # scripts/make-public-dump.sh on the host. See /datasets/ block in
      # nginx/conf.d/default.conf for rate-limit + autoindex config.
      - /media/bunker-admin/Internal/canadian-political-data-backups/public-dumps:/srv/datasets:ro
    depends_on: [api, frontend]
    restart: unless-stopped
    networks: [sw]

  # ── Pangolin Newt tunnel (outbound to pangolin.bnkserve.org) ──────
  newt:
    image: fosrl/newt
    container_name: sw-newt
    restart: unless-stopped
    environment:
      PANGOLIN_ENDPOINT: ${PANGOLIN_ENDPOINT:-https://pangolin.bnkserve.org}
      NEWT_ID: ${NEWT_ID}
      NEWT_SECRET: ${NEWT_SECRET}
    depends_on: [nginx]
    networks: [sw]

volumes:
  pgdata:
  changedata:
  kumadata:
  embedmodels:
  assets:

networks:
  sw:
    driver: bridge
