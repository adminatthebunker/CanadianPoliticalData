user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # Use Docker's embedded DNS (127.0.0.11) as the resolver. Combined
    # with variable-based proxy_pass in the per-location blocks, this
    # forces nginx to re-resolve upstream container names on each
    # request (TTL `valid=10s`). Without this nginx caches the
    # first-seen IP at config-load time and serves 502s for ~30s after
    # any `docker compose up -d --build api` until manually restarted.
    # ipv6=off because Docker's embedded DNS returns AAAA-records that
    # don't route, which costs an unnecessary lookup per request.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Per-IP guards for the public /datasets/ download surface. Both
    # zones key on $binary_remote_addr (IPv4 4 bytes / IPv6 16 bytes); a
    # 10 MB zone holds ~160k IPs at IPv4 / ~64k at IPv6 — plenty for a
    # civic-data download path. limit_conn caps simultaneous downloads
    # per IP; limit_req throttles autoindex / HEAD spam from crawlers.
    # Triggered only by the /datasets/ location block; other paths are
    # unaffected.
    limit_conn_zone $binary_remote_addr zone=datasets_per_ip:10m;
    limit_req_zone  $binary_remote_addr zone=datasets_req_per_ip:10m rate=30r/m;

    include /etc/nginx/conf.d/*.conf;
}
