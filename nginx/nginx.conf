user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # Use Docker's embedded DNS (127.0.0.11) as the resolver. Combined
    # with variable-based proxy_pass in the per-location blocks, this
    # forces nginx to re-resolve upstream container names on each
    # request (TTL `valid=10s`). Without this nginx caches the
    # first-seen IP at config-load time and serves 502s for ~30s after
    # any `docker compose up -d --build api` until manually restarted.
    # ipv6=off because Docker's embedded DNS returns AAAA-records that
    # don't route, which costs an unnecessary lookup per request.
    resolver 127.0.0.11 valid=10s ipv6=off;

    include /etc/nginx/conf.d/*.conf;
}
