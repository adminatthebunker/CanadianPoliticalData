# ─────────────────────────────────────────────────────────────────────────────
# docs.canadianpoliticaldata.org — static documentation site (MkDocs Material).
#
# Source markdown lives at /home/bunker-admin/sovpro/mkdocs/docs/.
# Static build output lives at /home/bunker-admin/sovpro/mkdocs/site/, populated
# by `docker compose run --rm docs build --strict` and bind-mounted RO into this
# nginx container at /var/www/docs (see the `nginx` service in docker-compose.yml).
#
# Pangolin must be configured to forward this hostname to the same upstream as
# canadianpoliticaldata.org for this vhost to be reachable publicly.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name docs.canadianpoliticaldata.org;

    root /var/www/docs;
    index index.html;

    client_max_body_size 1m;

    # Security headers (mirror the main vhost).
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # MkDocs uses pretty URLs by default — `path/` resolves to `path/index.html`.
    # Fall through to `path.html` for any pages emitted as flat HTML.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Long-cache hashed assets (Material emits versioned filenames under
    # /assets/, which makes them safe to cache aggressively).
    location ^~ /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
        access_log off;
    }

    # Never cache HTML — the build is the source of truth and we want operators
    # to see the current state immediately after a rebuild. Especially important
    # for the placeholder `mkdocs/site/index.html` shipped on a fresh checkout
    # so it doesn't shadow a freshly-built homepage.
    location ~ \.html$ {
        add_header Cache-Control "no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Don't expose the live-preview port through the public edge.
    location = /docs-preview { return 404; }
}
