server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 2m;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ─────────────────────────────────────────────────────────────────
    # Blog → docs site. The MDX-in-React blog was migrated to the MkDocs
    # Material blog plugin; URLs preserve the slug 1:1, so a permanent
    # redirect cleanly handles old inbound links and bookmarks.
    # ─────────────────────────────────────────────────────────────────
    location = /blog          { return 301 https://docs.canadianpoliticaldata.org/blog/; }
    location = /blog/         { return 301 https://docs.canadianpoliticaldata.org/blog/; }
    location ~ ^/blog/([^/]+)/?$ {
        return 301 https://docs.canadianpoliticaldata.org/blog/$1/;
    }

    # API. Variable-based proxy_pass forces re-resolution through the
    # http{} resolver — survives api-container recreates without an
    # nginx restart. See nginx.conf for the resolver config.
    location /api/ {
        set $api_upstream http://api:3000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health
    location = /health {
        set $api_upstream http://api:3000;
        proxy_pass $api_upstream/health;
    }

    # Public dataset downloads. The weekly cron (scripts/make-public-dump.sh
    # at Sun 02:00 local) drops a fresh `cpd-public-*.pgcustom` dump under
    # /media/bunker-admin/Internal/.../public-dumps/, which the docker-compose
    # bind-mount exposes here as /srv/datasets/. autoindex is on so the
    # latest snapshot is discoverable; rate controls keep a single client
    # (or a viral inbound link) from saturating the home upstream.
    #
    # Do NOT remove the limit_conn / limit_rate without measuring sustained
    # traffic first — see docs/gotchas.md § Public distribution.
    location /datasets/ {
        alias /srv/datasets/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime  on;

        # One IP can hold at most 2 concurrent download connections,
        # capped at 50 MB/s each. 30 req/min ceiling on autoindex /
        # HEAD requests blunts crawler hammering.
        limit_conn datasets_per_ip 2;
        limit_rate 50m;
        limit_req  zone=datasets_req_per_ip burst=10 nodelay;

        # Force-download MIME for the dump file extension. Browsers will
        # save as binary instead of trying to render.
        types { application/octet-stream pgcustom; }
        default_type application/octet-stream;

        add_header Cache-Control "public, max-age=3600";
        add_header X-Content-Type-Options nosniff;
        access_log /var/log/nginx/datasets.access.log;
    }

    # Locally-mirrored binary assets (politician portraits, etc).
    # Backed by the `assets` named volume, RW-written by the scanner
    # service and RO-mounted here. See db/migrations/0026 and
    # docs/plans/sovereignty-runtime-deps.md.
    #
    # Scoped to /assets/politicians/ so it does not shadow Vite's
    # build output (the frontend emits hashed bundles to /assets/*).
    # Anything else under /assets/ falls through to the frontend.
    location /assets/politicians/ {
        alias /var/www/assets/politicians/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
        access_log off;
    }

    # Uptime Kuma under /status/ (optional)
    location /status/ {
        set $kuma_upstream http://uptime-kuma:3001;
        proxy_pass $kuma_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Frontend
    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
